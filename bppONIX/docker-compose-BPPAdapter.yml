services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - beckn_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  onix-bpp:
    image: fidedocker/onix-adapter:latest
    container_name: onix-bpp
    platform: linux/amd64
    networks:
      - beckn_network
    ports:
      - "8082:8082"
    environment:
      CONFIG_FILE: "/app/config/local-simple-bpp.yaml"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      REDIS_ADDR: redis:6379
      RABBITMQ_ADDR: rabbitmq:5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin123
      OTEL_EXPORTER_OTLP_INSECURE: true
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector-bpp:4317

    volumes:
      - ./config:/app/config
      - ./schemas:/app/schemas
    command: [ "./server", "--config=/app/config/local-simple-bpp.yaml" ]

  otel-collector-bpp:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-bpp
    command: [ "--config=/etc/otel/config.yaml" ]
    volumes:
      - ./config/otel-collector-bpp/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4321:4317"
      - "4322:4318"
    networks:
      - beckn_network
    restart: unless-stopped

  seller-app:
    build:
      context: ../sellerApp
      dockerfile: Dockerfile
    container_name: seller-app
    networks:
      - beckn_network
    ports:
      - "3002:3002"
    environment:
      BPP_CALLER_URL: http://onix-bpp:8082/bpp/caller
      BPP_ID: ${NGROK_DOMAIN}
      # nginx-bpp prepends /bpp/receiver/ to every request, so no path needed here
      BPP_URI: https://${NGROK_DOMAIN}
      NETWORK_ID: ion.id/ION-DC-Registry
      PORT: "3002"
    depends_on:
      onix-bpp:
        condition: service_started
    restart: unless-stopped

  nginx-bpp:
    image: nginx:alpine
    container_name: nginx-bpp
    networks:
      - beckn_network
    volumes:
      - ./config/nginx-bpp.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - onix-bpp
    restart: unless-stopped

  ngrok-bpp:
    image: ngrok/ngrok:latest
    container_name: ngrok-bpp
    profiles:
      - ngrok
    networks:
      - beckn_network
    depends_on:
      - nginx-bpp
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http --url=${NGROK_DOMAIN} http://nginx-bpp:80
    ports:
      - "4040:4040"
    restart: unless-stopped

networks:
  beckn_network:
    name: beckn_network
    driver: bridge
