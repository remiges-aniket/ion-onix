services:
  # ============================================
  # Core Infrastructure Services
  # ============================================

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - beckn_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================
  # ONIX Adapters
  # ============================================

  onix-bap:
    image: fidedocker/onix-adapter:latest
    container_name: onix-bap
    platform: linux/amd64
    networks:
      - beckn_network
    ports:
      - "8081:8081"
    environment:
      CONFIG_FILE: "/app/config/local-simple-bap.yaml"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      REDIS_ADDR: redis:6379
      RABBITMQ_ADDR: rabbitmq:5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin123
    volumes:
      - ./config:/app/config
      - ./schemas:/app/schemas
    command: [ "./server", "--config=/app/config/local-simple-bap.yaml" ]
    depends_on:
      redis:
        condition: service_healthy

  onix-bpp:
    image: fidedocker/onix-adapter:latest
    container_name: onix-bpp
    platform: linux/amd64
    networks:
      - beckn_network
    ports:
      - "8082:8082"
    environment:
      CONFIG_FILE: "/app/config/local-simple-bpp.yaml"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      REDIS_ADDR: redis:6379
      RABBITMQ_ADDR: rabbitmq:5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin123
    volumes:
      - ./config:/app/config
      - ./schemas:/app/schemas
    command: [ "./server", "--config=/app/config/local-simple-bpp.yaml" ]
    depends_on:
      redis:
        condition: service_healthy

  # ============================================
  # Seller App (BPP backend) — replaces sandbox-bpp
  # ============================================

  seller-app:
    container_name: seller-app
    build:
      context: ../sellerApp
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      - PORT=3002
      - BPP_CALLER_URL=http://onix-bpp:8082/bpp/caller
      - BPP_ID=dc-bpp.ion.id
      - BPP_URI=http://onix-bpp:8082/bpp/receiver
      - NETWORK_ID=ion.id/ION-DC-Registry
    ports:
      - "3002:3002"
    networks:
      - beckn_network
    depends_on:
      - onix-bpp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ============================================
  # Buyer App (BAP backend) — replaces sandbox-bap
  # ============================================

  buyer-app:
    container_name: buyer-app
    build:
      context: ../buyerApp
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      - PORT=3001
      - BAP_CALLER_URL=http://onix-bap:8081/bap/caller
      - BAP_ID=dc-bap.ion.id
      - BAP_URI=http://onix-bap:8081/bap/receiver
      - NETWORK_ID=ion.id/ION-DC-Registry
    ports:
      - "3001:3001"
    networks:
      - beckn_network
    depends_on:
      - onix-bap
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  beckn_network:
    name: beckn_network
    driver: bridge
