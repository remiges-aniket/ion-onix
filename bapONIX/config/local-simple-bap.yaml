appName: "onix-local"
log:
  level: debug
  destinations:
    - type: stdout
  contextKeys:
    - transaction_id
    - message_id
    - subscriber_id
    - module_id
http:
  port: 8081
  timeout:
    read: 30
    write: 30
    idle: 30
pluginManager:
  root: ./plugins

plugins:
  otelsetup:
    id: otelsetup
    config:
      serviceName: "beckn-onix"
      otlpEndpoint: "otel-collector-bap:4317"
      enableMetrics: "true"
      enableTracing: "true"
      enableLogs: "true"
      timeInterval: "5"
      auditFieldsConfig: "/app/config/audit-fields.yaml" # this can be git url
      producer: 'camera-outmatch-emptiness.ngrok-free.dev'
      producerType: "bap"

modules:
  - name: bapTxnReceiver
    path: /bap/receiver/
    handler:
      type: std
      role: bap
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://fabric.nfh.global/registry/dedi
            registryName: subscribers.beckn.one
            timeout: 10
            retry_max: 3
            retry_wait_min: 100ms
            retry_wait_max: 500ms
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: 'camera-outmatch-emptiness.ngrok-free.dev'
            keyId: '76EU8va3Vbsg3foqotmLEAsXBqUFwbNu59rfFs7wxVi6BncBWvBN3b'
            signingPrivateKey: 'a+MNgTYjsJZ5n3uZM4KiZJX0bynuLtsUwpt33tKOFc4='
            signingPublicKey: 'GtYa8aZWknrYGkEa4PEQ1oNjC012XY4KLyrWeGll79E='
            encrPrivateKey: 'a+MNgTYjsJZ5n3uZM4KiZJX0bynuLtsUwpt33tKOFc4='
            encrPublicKey: 'GtYa8aZWknrYGkEa4PEQ1oNjC012XY4KLyrWeGll79E='
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io,schema.ion.id"
        cache:
          id: cache
          config:
            addr: redis:6379
        router:
          id: router
          config:
            routingConfig: ./config/local-simple-routing-BAPReceiver.yaml
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bap
      steps:
        - addRoute
        - validateSchema
  
  - name: bapTxnCaller
    path: /bap/caller/
    handler:
      type: std
      role: bap
      subscriberId: 'camera-outmatch-emptiness.ngrok-free.dev'
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://fabric.nfh.global/registry/dedi
            registryName: subscribers.beckn.one
            timeout: 10
            retry_max: 3
            retry_wait_min: 100ms
            retry_wait_max: 500ms
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: 'camera-outmatch-emptiness.ngrok-free.dev'
            keyId: '76EU8va3Vbsg3foqotmLEAsXBqUFwbNu59rfFs7wxVi6BncBWvBN3b'
            signingPrivateKey: 'a+MNgTYjsJZ5n3uZM4KiZJX0bynuLtsUwpt33tKOFc4='
            signingPublicKey: 'GtYa8aZWknrYGkEa4PEQ1oNjC012XY4KLyrWeGll79E='
            encrPrivateKey: 'a+MNgTYjsJZ5n3uZM4KiZJX0bynuLtsUwpt33tKOFc4='
            encrPublicKey: 'GtYa8aZWknrYGkEa4PEQ1oNjC012XY4KLyrWeGll79E='
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io,schema.ion.id"
        cache:
          id: cache
          config:
            addr: redis:6379
        router:
          id: router
          config:
            routingConfig: ./config/local-simple-routing-BAPCaller.yaml
        signer:
          id: signer
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bap
      steps:
        - addRoute
        - sign
        - validateSchema
  
