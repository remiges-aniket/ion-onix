server {
    listen 80;

    location / {
        # Prepend /bap/receiver/ to every incoming request.
        # Incoming:  /on_discover  →  upstream: /bap/receiver/on_discover
        proxy_pass http://onix-bap:8081/bap/receiver/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
